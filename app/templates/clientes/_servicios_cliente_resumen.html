<div class="rounded-xl bg-white p-5 shadow-md dark:bg-gray-800">
    {% set servicios_total = cliente.servicios_contratados.count() %}
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div>
            <p class="text-xs font-semibold uppercase tracking-[0.2em] text-emerald-600 dark:text-emerald-300">Servicios del cliente</p>
            <h2 class="mt-1 text-lg font-semibold text-gray-900 dark:text-white">Gestión separada del catálogo</h2>
            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
                {{ servicios_total }} asignación{% if servicios_total != 1 %}es{% endif %} registrada{% if servicios_total != 1 %}s{% endif %}.
            </p>
        </div>
        <a href="{{ url_for('clientes_servicios.detalle', id_cliente=cliente.id_cliente) }}"
            class="inline-flex items-center justify-center rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-emerald-700">
            <i class="fas fa-layer-group mr-2"></i>Gestionar servicios
        </a>
    </div>
</div>
