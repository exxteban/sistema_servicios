<section class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm dark:border-white/10 dark:bg-slate-900">
    <div class="flex items-center gap-2 border-b border-slate-100 px-5 py-4 dark:border-white/5">
        <span class="flex h-8 w-8 shrink-0 items-center justify-center rounded-lg bg-blue-50 text-sm text-blue-600 dark:bg-blue-500/15 dark:text-blue-300">
            <i class="far fa-user"></i>
        </span>
        <div class="min-w-0">
            <h2 class="text-sm font-bold text-slate-950 dark:text-white">Profesionales de hoy</h2>
            <p class="text-xs text-slate-500 dark:text-slate-400">Disponibilidad rápida del equipo activo.</p>
        </div>
    </div>
    <div class="px-5 py-3">
        <div class="space-y-2">
            {% for usuario in usuarios_activos_lista %}
            <button type="button"
                @click="openProfessionalDetail({{ usuario.id_usuario }})"
                class="flex w-full flex-col gap-2 rounded-xl border border-slate-100 bg-slate-50/80 p-3 text-left transition hover:border-slate-200 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-200 dark:border-white/5 dark:bg-white/[0.03] dark:hover:bg-white/[0.05] dark:focus:ring-blue-500/30 sm:flex-row sm:items-center sm:justify-between">
                <div class="flex min-w-0 items-center gap-3">
                    <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-slate-100 text-xs font-bold text-slate-600 dark:bg-slate-800 dark:text-slate-300">
                        {{ usuario.nombre_completo[0] if usuario.nombre_completo else '?' }}
                    </span>
                    <div class="min-w-0">
                        <p class="break-words text-sm font-semibold leading-5 text-slate-900 dark:text-white">{{ usuario.nombre_completo }}</p>
                        <p class="mt-0.5 text-[11px] text-slate-500 dark:text-slate-400">{{ usuario.rol.nombre if usuario.rol else 'Profesional' }}</p>
                    </div>
                </div>
                <div class="self-start sm:self-center sm:pl-3">
                    {% if usuario.id_usuario in usuarios_ocupados_ids %}
                    <span class="inline-flex items-center gap-1.5 rounded-full bg-blue-50 px-2.5 py-1 text-[11px] font-bold text-blue-700 dark:bg-blue-500/15 dark:text-blue-200">
                        <span class="h-1.5 w-1.5 rounded-full bg-blue-500"></span>
                        Ocupado
                    </span>
                    {% else %}
                    <span class="inline-flex items-center gap-1.5 rounded-full bg-emerald-50 px-2.5 py-1 text-[11px] font-bold text-emerald-700 dark:bg-emerald-500/15 dark:text-emerald-200">
                        <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>
                        Libre
                    </span>
                    {% endif %}
                </div>
            </button>
            {% else %}
            <div class="rounded-xl border border-dashed border-slate-200 px-4 py-6 text-center text-sm text-slate-500 dark:border-white/10 dark:text-slate-400">
                No hay profesionales activos.
            </div>
            {% endfor %}
        </div>
        {% if usuarios_activos_lista %}
        <p class="mt-3 text-[11px] text-slate-500 dark:text-slate-400">Haz click en un profesional para ver su sesion actual.</p>
        {% endif %}
    </div>
</section>
