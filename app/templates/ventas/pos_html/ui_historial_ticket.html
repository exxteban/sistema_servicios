            <!-- Header -->
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-4 py-3 flex justify-between items-center"
                style="flex-shrink: 0;">
                <div style="flex: 1; min-width: 0; padding-right: 12px;">
                    <h3 class="font-bold flex items-center gap-2" style="font-size: 15px;">
                        <i class="fas fa-history"></i> Historial de Compras
                    </h3>
                    <p class="text-indigo-100 truncate" style="font-size: 12px; margin-top: 2px;"
                        x-text="historialDatos.cliente ? historialDatos.cliente.nombre : ''"></p>
                </div>
                <button @click="mostrarModalHistorial = false"
                    class="rounded-lg border border-white/30 px-2 py-1 text-white transition hover:bg-white/10 hover:text-indigo-100"
                    style="flex-shrink: 0;">
                    <i class="fas fa-times" style="font-size: 18px;"></i>
                </button>
            </div>

            <!-- Content -->
            <div class="p-4 overflow-y-auto custom-scrollbar" style="flex: 1; min-height: 0;">

                <!-- Loading State -->
                <div x-show="historialCargando" class="flex flex-col items-center justify-center text-gray-400"
                    style="padding: 30px 0;">
                    <i class="fas fa-circle-notch fa-spin text-indigo-500"
                        style="font-size: 28px; margin-bottom: 8px;"></i>
                    <p style="font-size: 13px;">Cargando historial...</p>
                </div>

                <!-- Data State -->
                <div x-show="!historialCargando && historialDatos.cliente">

                    <!-- Stats Cards - Horizontal layout -->
                    <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                        <div class="bg-indigo-50 dark:bg-indigo-900/20 border border-indigo-100 dark:border-indigo-800/50"
                            style="flex: 1; padding: 10px; border-radius: 8px;">
                            <p class="text-indigo-500 dark:text-indigo-300 font-semibold uppercase"
                                style="font-size: 9px; letter-spacing: 0.5px; margin-bottom: 2px;">Total Gastado</p>
                            <p class="font-bold text-indigo-700 dark:text-indigo-400 truncate" style="font-size: 14px;"
                                x-text="'₲ ' + formatNumber(historialDatos.estadisticas.total_gastado)"></p>
                        </div>
                        <div class="bg-purple-50 dark:bg-purple-900/20 border border-purple-100 dark:border-purple-800/50"
                            style="flex: 1; padding: 10px; border-radius: 8px;">
                            <p class="text-purple-500 dark:text-purple-300 font-semibold uppercase"
                                style="font-size: 9px; letter-spacing: 0.5px; margin-bottom: 2px;">Visitas</p>
                            <p class="font-bold text-purple-700 dark:text-purple-400" style="font-size: 14px;"
                                x-text="historialDatos.estadisticas.cantidad_compras"></p>
                        </div>
                        <div class="bg-green-50 dark:bg-green-900/20 border border-green-100 dark:border-green-800/50"
                            style="flex: 1; padding: 10px; border-radius: 8px;">
                            <p class="text-green-500 dark:text-green-300 font-semibold uppercase"
                                style="font-size: 9px; letter-spacing: 0.5px; margin-bottom: 2px;">Promedio / Compra</p>
                            <p class="font-bold text-green-700 dark:text-green-400 truncate" style="font-size: 14px;"
                                x-text="'₲ ' + formatNumber(historialDatos.estadisticas.promedio_compra)"></p>
                        </div>
                    </div>

                    <h4 class="font-bold text-gray-800 dark:text-white border-b dark:border-gray-700"
                        style="font-size: 13px; margin-bottom: 8px; padding-bottom: 6px;">
                        Últimas Compras</h4>

                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <template x-for="venta in historialDatos.historial" :key="venta.id_venta">
                            <div class="bg-gray-50 dark:bg-gray-700/50 hover:bg-gray-100 dark:hover:bg-gray-700 transition border border-gray-100 dark:border-gray-600"
                                style="border-radius: 8px; padding: 10px;">
                                <div
                                    style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px;">
                                    <div style="display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0;">
                                        <div class="bg-white dark:bg-gray-600 shadow-sm text-indigo-500 dark:text-indigo-300"
                                            style="padding: 6px; border-radius: 50%; flex-shrink: 0;">
                                            <i class="fas fa-shopping-bag" style="font-size: 10px;"></i>
                                        </div>
                                        <div style="min-width: 0; flex: 1;">
                                            <p class="font-semibold text-gray-800 dark:text-white"
                                                style="font-size: 12px;" x-text="venta.fecha"></p>
                                            <p class="text-gray-500 dark:text-gray-400" style="font-size: 10px;"
                                                x-text="'Ticket: ' + venta.numero_ticket"></p>
                                        </div>
                                    </div>
                                    <span
                                        class="font-bold text-green-600 dark:text-green-400 bg-green-50 dark:bg-green-900/30 whitespace-nowrap"
                                        style="padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 8px;"
                                        x-text="'₲ ' + formatNumber(venta.total)"></span>
                                </div>
                                <div style="padding-left: 32px;">
                                    <p class="text-gray-600 dark:text-gray-300 line-clamp-1" style="font-size: 10px;"
                                        x-text="venta.items_resumen"></p>
                                </div>
                            </div>
                        </template>

                        <div x-show="historialDatos.historial.length === 0"
                            class="text-center text-gray-500 dark:text-gray-400" style="padding: 24px 0;">
                            <i class="fas fa-ghost opacity-50"
                                style="font-size: 28px; margin-bottom: 8px; display: block;"></i>
                            <p style="font-size: 13px;">No hay compras registradas.</p>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Footer -->
            <div class="bg-gray-50 dark:bg-gray-700/50 border-t dark:border-gray-700 text-right"
                style="padding: 10px 16px; flex-shrink: 0;">
                <button @click="mostrarModalHistorial = false"
                    class="border border-gray-300 bg-gray-100 font-medium text-gray-800 transition hover:bg-gray-200 dark:border-gray-500 dark:bg-gray-600 dark:text-white dark:hover:bg-gray-500"
                    style="padding: 8px 16px; border-radius: 8px; font-size: 13px;">
                    Cerrar
                </button>
            </div>
        </div>
    </div>

    <iframe x-ref="ticketPrintFrame" title="Impresión de ticket"
        style="position:absolute;left:-9999px;top:-9999px;width:58mm;height:220mm;border:0;opacity:0;pointer-events:none;"></iframe>

</div>
