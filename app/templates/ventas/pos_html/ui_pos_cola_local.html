<div x-show="ventasPendientes.length > 0" x-cloak
    class="rounded-xl border border-amber-300 bg-amber-50 p-4 text-amber-950 shadow-sm dark:border-amber-500/50 dark:bg-amber-500/10 dark:text-amber-100">
    <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
        <div class="flex gap-3">
            <div class="mt-0.5 flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-amber-200 text-amber-800 dark:bg-amber-500/20 dark:text-amber-200">
                <i class="fas fa-cloud-upload-alt"></i>
            </div>
            <div>
                <div class="font-bold">Ventas en cola local</div>
                <div class="text-sm" x-text="resumenColaLocalTexto()"></div>
                <div class="mt-1 text-xs text-amber-800 dark:text-amber-200">
                    El sistema sigue funcionando. Si apaga el equipo, al volver a abrir este POS se reintentara el envio. No borre datos del navegador.
                </div>
                <div x-show="ultimaSincronizacionError"
                    class="mt-2 rounded-lg bg-red-100 px-3 py-2 text-xs font-semibold text-red-800 dark:bg-red-500/15 dark:text-red-200"
                    x-text="'Ultimo intento: ' + ultimaSincronizacionError"></div>
            </div>
        </div>
        <button type="button" @click="sincronizarVentasPendientes()" :disabled="sincronizandoPendientes"
            class="rounded-lg border border-amber-800 bg-amber-700 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-amber-800 disabled:cursor-wait disabled:opacity-70 dark:border-amber-400">
            <span x-text="sincronizandoPendientes ? 'Enviando...' : 'Intentar enviar ahora'"></span>
        </button>
    </div>
    <div class="mt-3 grid gap-2 md:grid-cols-2 xl:grid-cols-3">
        <template x-for="venta in ventasPendientes.slice(0, 6)" :key="venta.client_request_id">
            <div class="rounded-lg border border-amber-200 bg-white/80 p-3 text-xs dark:border-amber-500/30 dark:bg-gray-900/50">
                <div class="flex items-center justify-between gap-2">
                    <span class="font-semibold text-gray-800 dark:text-gray-100" x-text="estadoVentaPendienteTexto(venta)"></span>
                    <span class="font-bold text-amber-800 dark:text-amber-200" x-text="'₲ ' + formatNumber(totalVentaPendiente(venta))"></span>
                </div>
                <div class="mt-1 text-gray-600 dark:text-gray-300" x-text="fechaVentaPendienteTexto(venta)"></div>
                <div class="mt-1 truncate font-mono text-[11px] text-gray-500 dark:text-gray-400" x-text="venta.client_request_id"></div>
                <div x-show="venta.ultimo_error"
                    class="mt-2 rounded bg-red-50 px-2 py-1 font-semibold text-red-700 dark:bg-red-500/10 dark:text-red-200"
                    x-text="venta.ultimo_error"></div>
            </div>
        </template>
    </div>
    <div x-show="ventasPendientes.length > 6" class="mt-2 text-xs font-semibold text-amber-800 dark:text-amber-200"
        x-text="`Y ${ventasPendientes.length - 6} pendiente(s) mas...`"></div>
</div>
