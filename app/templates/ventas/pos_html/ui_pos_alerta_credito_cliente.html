<div x-show="ventasCreditoActivo && (resumenCreditoCliente.cargando || clienteTieneDeudaVisible())" x-cloak
    class="mt-2.5 rounded-xl border px-3 py-3 transition-colors"
    :class="clienteEstaMoraVisible()
        ? 'border-red-300 bg-red-50 shadow-sm dark:border-red-800/50 dark:bg-red-900/20 dark:shadow-none'
        : 'border-amber-300 bg-amber-50 shadow-sm dark:border-amber-800/50 dark:bg-amber-900/20 dark:shadow-none'">
    <div x-show="resumenCreditoCliente.cargando" class="text-sm text-gray-600 dark:text-gray-300">
        Consultando deuda del cliente...
    </div>

    <div x-show="!resumenCreditoCliente.cargando && clienteTieneDeudaVisible()" class="space-y-2">
        <div class="flex items-start justify-between gap-3">
            <div>
                <div class="text-sm font-semibold"
                    :class="clienteEstaMoraVisible() ? 'text-red-700 dark:text-red-300' : 'text-amber-800 dark:text-amber-200'">
                    <span x-text="clienteEstaMoraVisible() ? 'Cliente con deuda vencida' : 'Cliente con deuda vigente'"></span>
                </div>
                <div class="text-xs"
                    :class="clienteEstaMoraVisible() ? 'text-red-600 dark:text-red-300' : 'text-amber-700 dark:text-amber-300'">
                    Saldo pendiente: ₲ <span x-text="formatNumber(resumenCreditoCliente.saldoTotal)"></span>
                </div>
            </div>
            <span class="inline-flex rounded-full px-2.5 py-1 text-[11px] font-semibold"
                :class="clienteEstaMoraVisible()
                    ? 'border border-red-300 bg-red-100 text-red-700 dark:border-red-700 dark:bg-red-900/40 dark:text-red-300'
                    : 'border border-amber-300 bg-amber-100 text-amber-800 dark:border-amber-700 dark:bg-amber-900/40 dark:text-amber-300'">
                <span x-text="resumenCreditoCliente.cuentasVencidas > 0 ? `${resumenCreditoCliente.cuentasVencidas} vencida(s)` : `${resumenCreditoCliente.cuentasAbiertas} cuenta(s)`"></span>
            </span>
        </div>

        <div class="flex flex-wrap gap-2">
            <button type="button"
                x-show="resumenCreditoCliente.urlCobrar"
                @click="abrirCobranzaCliente(resumenCreditoCliente.urlCobrar)"
                class="inline-flex items-center rounded-lg border border-emerald-700 bg-emerald-600 px-3 py-2 text-xs font-semibold text-white transition hover:bg-emerald-700 dark:border-emerald-500">
                <i class="fas fa-hand-holding-usd mr-2"></i>Cobrar saldo
            </button>
            <button type="button"
                x-show="resumenCreditoCliente.urlCliente"
                @click="abrirCobranzaCliente(resumenCreditoCliente.urlCliente)"
                class="inline-flex items-center rounded-lg border border-gray-300 bg-white px-3 py-2 text-xs font-semibold text-gray-700 transition hover:bg-gray-50 dark:border-gray-700 dark:bg-gray-900 dark:text-gray-200 dark:hover:bg-gray-800">
                <i class="fas fa-folder-open mr-2"></i>Ver detalle
            </button>
        </div>
    </div>
</div>
