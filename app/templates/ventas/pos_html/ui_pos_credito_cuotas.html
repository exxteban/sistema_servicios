<div x-show="creditoModoCuotasActivo()" x-cloak
    class="space-y-3 rounded-xl border border-blue-300 bg-white p-3 shadow-sm dark:border-blue-800/60 dark:bg-blue-950/10 dark:shadow-none">
    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 2xl:grid-cols-4">
        <label class="flex h-full min-w-0 flex-col font-semibold text-gray-500 dark:text-gray-400">
            <span class="block min-h-8 break-words text-[10px] leading-snug sm:min-h-9 sm:text-[11px] 2xl:text-xs">Cantidad de cuotas</span>
            <input type="number" x-model.number="creditoCuotas" min="2" max="60"
                class="mt-1 w-full min-w-0 rounded-lg border border-gray-300 bg-white px-2.5 py-2 text-[13px] text-gray-800 focus:border-blue-500 focus:outline-none sm:px-3 sm:text-sm dark:border-gray-700 dark:bg-gray-900 dark:text-white">
        </label>
        <label class="flex h-full min-w-0 flex-col font-semibold text-gray-500 dark:text-gray-400">
            <span class="block min-h-8 break-words text-[10px] leading-snug sm:min-h-9 sm:text-[11px] 2xl:text-xs">Frecuencia (dias)</span>
            <input type="number" x-model.number="creditoFrecuenciaDias" min="1" max="365"
                @input="if (!creditoPrimerVencimiento) asegurarFechaPrimerVencimientoCredito()"
                class="mt-1 w-full min-w-0 rounded-lg border border-gray-300 bg-white px-2.5 py-2 text-[13px] text-gray-800 focus:border-blue-500 focus:outline-none sm:px-3 sm:text-sm dark:border-gray-700 dark:bg-gray-900 dark:text-white">
        </label>
        <label class="flex h-full min-w-0 flex-col font-semibold text-gray-500 dark:text-gray-400">
            <span class="block min-h-8 break-words text-[10px] leading-snug sm:min-h-9 sm:text-[11px] 2xl:text-xs">Primer vencimiento</span>
            <input type="date" x-model="creditoPrimerVencimiento"
                class="mt-1 w-full min-w-0 rounded-lg border border-gray-300 bg-white px-2 py-2 text-[11px] text-gray-800 focus:border-blue-500 focus:outline-none sm:px-2.5 sm:text-[12px] md:text-[13px] dark:border-gray-700 dark:bg-gray-900 dark:text-white">
        </label>
        <label class="flex h-full min-w-0 flex-col font-semibold text-gray-500 dark:text-gray-400">
            <span class="block min-h-8 break-words text-[10px] leading-snug sm:min-h-9 sm:text-[11px] 2xl:text-xs">Interes por cuota (%)</span>
            <input type="number" x-model.number="creditoTasaInteresPct" min="0" max="100" step="0.01"
                class="mt-1 w-full min-w-0 rounded-lg border border-gray-300 bg-white px-2.5 py-2 text-[13px] text-gray-800 focus:border-blue-500 focus:outline-none sm:px-3 sm:text-sm dark:border-gray-700 dark:bg-gray-900 dark:text-white">
        </label>
    </div>

    <div class="grid grid-cols-1 gap-3 text-sm sm:grid-cols-2 2xl:grid-cols-4">
        <div class="rounded-lg border border-blue-200 bg-blue-50 px-3 py-2 shadow-sm dark:border-transparent dark:bg-blue-900/20 dark:shadow-none">
            <div class="break-words text-[10px] font-semibold leading-snug text-gray-500 sm:text-[11px] dark:text-gray-400">Cuota estimada</div>
            <div class="mt-1 break-words text-[15px] font-bold leading-tight text-blue-700 sm:text-[17px] dark:text-blue-300"
                x-text="'₲ ' + formatNumber(cuotaEstimadaCredito())"></div>
        </div>
        <div class="rounded-lg border border-blue-200 bg-blue-50 px-3 py-2 shadow-sm dark:border-transparent dark:bg-blue-900/20 dark:shadow-none">
            <div class="break-words text-[10px] font-semibold leading-snug text-gray-500 sm:text-[11px] dark:text-gray-400">Primer vencimiento</div>
            <div class="mt-1 break-all text-[14px] font-bold leading-tight text-gray-900 sm:text-[15px] md:text-[17px] dark:text-white"
                x-text="creditoPrimerVencimiento || 'Pendiente'"></div>
        </div>
        <div class="rounded-lg border border-blue-200 bg-blue-50 px-3 py-2 shadow-sm dark:border-transparent dark:bg-blue-900/20 dark:shadow-none">
            <div class="break-words text-[10px] font-semibold leading-snug text-gray-500 sm:text-[11px] dark:text-gray-400">Interes total</div>
            <div class="mt-1 break-words text-[15px] font-bold leading-tight text-blue-700 sm:text-[17px] dark:text-blue-300"
                x-text="'₲ ' + formatNumber(resumenCreditoCuotas().interesTotal)"></div>
        </div>
        <div class="rounded-lg border border-blue-200 bg-blue-50 px-3 py-2 shadow-sm dark:border-transparent dark:bg-blue-900/20 dark:shadow-none">
            <div class="break-words text-[10px] font-semibold leading-snug text-gray-500 sm:text-[11px] dark:text-gray-400">Total en cuotas</div>
            <div class="mt-1 break-words text-[15px] font-bold leading-tight text-gray-900 sm:text-[17px] dark:text-white"
                x-text="'₲ ' + formatNumber(resumenCreditoCuotas().totalConInteres)"></div>
        </div>
    </div>

    <div class="rounded-lg border border-blue-300 bg-blue-50 px-3 py-2 text-xs text-blue-900 shadow-sm dark:border-blue-800/60 dark:bg-blue-900/20 dark:text-blue-100 dark:shadow-none">
        Los pagos posteriores se imputan automaticamante desde la cuota mas antigua pendiente.
    </div>
</div>
