<script>
(function() {
    if (window.__tiendaAdminPromocionesRuntimeInstalled) return;
    window.__tiendaAdminPromocionesRuntimeInstalled = true;

    const state = {
        productos: [],
        busquedaTimer: null,
        adminBusquedaTimer: null,
        adminUltimaBusqueda: '',
        adminBusquedaController: null
    };

    function elementosBusquedaAdmin() {
        return {
            form: document.getElementById('tienda-admin-search-form'),
            input: document.getElementById('tienda-admin-search-input'),
            clearButton: document.getElementById('tienda-admin-search-clear'),
            results: document.getElementById('tienda-admin-results')
        };
    }

    function actualizarBotonLimpiarAdmin() {
        const { input, clearButton } = elementosBusquedaAdmin();
        if (!input || !clearButton) return;
        const mostrar = Boolean((input.value || '').length);
        clearButton.classList.toggle('hidden', !mostrar);
        clearButton.classList.toggle('flex', mostrar);
    }

    function restaurarFocoAdmin(selectionStart, selectionEnd) {
        const { input } = elementosBusquedaAdmin();
        if (!input) return;
        input.focus({ preventScroll: true });
        if (typeof selectionStart === 'number' && typeof selectionEnd === 'number') {
            input.setSelectionRange(selectionStart, selectionEnd);
            return;
        }
        const posicion = (input.value || '').length;
        input.setSelectionRange(posicion, posicion);
    }

    async function cargarResultadosAdmin(url, { restaurarFoco = false } = {}) {
        const { input, results } = elementosBusquedaAdmin();
        if (!input || !results) {
            window.location.assign(url.toString());
            return;
        }
        const selectionStart = input.selectionStart;
        const selectionEnd = input.selectionEnd;
        if (state.adminBusquedaController) state.adminBusquedaController.abort();
        state.adminBusquedaController = new AbortController();
        const partialUrl = new URL(url.toString());
        partialUrl.searchParams.set('partial', '1');
        partialUrl.searchParams.set('fragment', 'productos');
        results.classList.add('opacity-60', 'pointer-events-none');
        try {
            const response = await fetch(partialUrl.toString(), {
                headers: { 'X-Requested-With': 'XMLHttpRequest' },
                cache: 'no-store',
                signal: state.adminBusquedaController.signal
            });
            if (!response.ok) throw new Error('No se pudo actualizar la búsqueda');
            results.innerHTML = await response.text();
            state.adminUltimaBusqueda = (input.value || '').trim();
            window.history.replaceState({}, '', url.toString());
            if (restaurarFoco) {
                window.requestAnimationFrame(() => restaurarFocoAdmin(selectionStart, selectionEnd));
            }
        } catch (error) {
            if (error.name !== 'AbortError') window.location.assign(url.toString());
        } finally {
            results.classList.remove('opacity-60', 'pointer-events-none');
            state.adminBusquedaController = null;
        }
    }

    window.tiendaAdminEnviarBusqueda = function() {
        const { form: searchForm, input } = elementosBusquedaAdmin();
        if (!searchForm || !input) return;
        const url = new URL(searchForm.action, window.location.origin);
        const termino = (input.value || '').trim();
        if (termino) url.searchParams.set('q', termino);
        else url.searchParams.delete('q');
        url.searchParams.delete('page');
        cargarResultadosAdmin(url, { restaurarFoco: true });
    };

    window.tiendaAdminProgramarAutoBusqueda = function() {
        const { input } = elementosBusquedaAdmin();
        if (!input) return;
        actualizarBotonLimpiarAdmin();
        const termino = (input.value || '').trim();
        window.clearTimeout(state.adminBusquedaTimer);
        if (termino === state.adminUltimaBusqueda || (termino && termino.length < 2)) return;
        state.adminBusquedaTimer = window.setTimeout(() => {
            state.adminUltimaBusqueda = termino;
            window.tiendaAdminEnviarBusqueda();
        }, 350);
    };

    window.tiendaAdminLimpiarBusqueda = function() {
        const { input } = elementosBusquedaAdmin();
        if (!input) return;
        window.clearTimeout(state.adminBusquedaTimer);
        input.value = '';
        state.adminUltimaBusqueda = '';
        actualizarBotonLimpiarAdmin();
        window.tiendaAdminEnviarBusqueda();
    };

    function form() {
        return document.getElementById('formPromocion');
    }

    function slugActual() {
        return document.querySelector('#formPromocion [name="slug_actual"]')?.value || '';
    }

    function productoKey(producto) {
        return `${producto.tipo_catalogo || 'producto'}:${producto.id_producto}`;
    }

    function syncTipo() {
        const currentForm = form();
        if (!currentForm) return;
        const esCantidad = currentForm.elements.tipo.value === 'cantidad';
        document.getElementById('promocionValorField')?.classList.toggle('hidden', esCantidad);
        document.getElementById('promocionCantidadFields')?.classList.toggle('hidden', !esCantidad);
        currentForm.elements.valor.required = !esCantidad;
    }

    function renderSeleccionados() {
        const container = document.getElementById('promocionProductosSeleccionados');
        if (!container) return;
        if (!state.productos.length) {
            container.innerHTML = '<p class="text-sm text-gray-500 dark:text-gray-400">Todavía no agregaste productos.</p>';
            return;
        }
        container.innerHTML = state.productos.map((product) => `
            <span class="inline-flex items-center gap-2 rounded-full bg-rose-100 dark:bg-rose-900/30 px-3 py-1.5 text-sm font-medium text-rose-700 dark:text-rose-300">
                ${product.codigo ? `<span class="font-mono text-xs">${product.codigo}</span>` : ''}
                ${product.tipo_catalogo === 'gastronomia' ? '<span class="text-[10px] uppercase">Menú</span>' : ''}
                <span>${product.nombre}</span>
                <button type="button" class="text-rose-600 dark:text-rose-300 hover:text-rose-800" data-promo-remove="${productoKey(product)}">
                    <i class="fas fa-times"></i>
                </button>
            </span>
        `).join('');
    }

    function renderResultados(productos) {
        const container = document.getElementById('promocionProductoResultados');
        if (!container) return;
        if (!productos.length) {
            container.innerHTML = '<p class="text-sm text-gray-500 dark:text-gray-400">No se encontraron productos.</p>';
            return;
        }
        container.innerHTML = productos.map((product) => {
            const selected = state.productos.some((item) => productoKey(item) === productoKey(product));
            const payload = encodeURIComponent(JSON.stringify(product));
            return `
                <button type="button" data-promo-add="${payload}" class="flex items-center justify-between gap-3 rounded-xl border px-3 py-2 text-left transition ${
                    selected
                        ? 'border-rose-300 bg-rose-50 dark:border-rose-700 dark:bg-rose-900/20'
                        : 'border-gray-200 bg-white hover:border-rose-300 hover:bg-rose-50 dark:border-gray-700 dark:bg-gray-800 dark:hover:border-rose-700 dark:hover:bg-gray-800'
                }">
                    <span>
                        <span class="block text-sm font-semibold text-gray-900 dark:text-white">${product.nombre}</span>
                        <span class="block text-xs text-gray-500 dark:text-gray-400">${product.codigo || ''}</span>
                    </span>
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-200">₲ ${Number(product.precio_venta || 0).toLocaleString('es-PY')}</span>
                </button>
            `;
        }).join('');
    }

    function resetForm() {
        const currentForm = form();
        if (!currentForm) return;
        currentForm.reset();
        currentForm.elements.promotion_id.value = '';
        currentForm.elements.tipo.value = 'porcentaje';
        currentForm.elements.activa.checked = true;
        state.productos = [];
        syncTipo();
        renderSeleccionados();
        renderResultados([]);
        const title = document.getElementById('modal-promocion-title');
        if (title) title.textContent = 'Nueva promoción';
    }

    function toDatetimeLocal(value) {
        return value ? String(value).slice(0, 16) : '';
    }

    async function buscarProductos(term = '') {
        const slug = slugActual();
        if (!slug) return;
        const url = new URL('/api/tienda/admin/promociones/productos', window.location.origin);
        url.searchParams.set('slug_actual', slug);
        if (term) url.searchParams.set('q', term);
        const res = await fetch(url.toString(), {
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            cache: 'no-store'
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'No se pudo buscar productos');
        renderResultados(data.productos || []);
    }

    window.abrirModalPromocion = async function(prefill = null) {
        const modal = document.getElementById('modalPromocion');
        const currentForm = form();
        if (!modal || !currentForm) return;
        resetForm();
        const productos = prefill?.productos || [];
        if (productos.length) {
            state.productos = productos.map((product) => ({
                id_producto: Number(product.id_producto),
                codigo: product.codigo || '',
                nombre: product.nombre || '',
                precio_venta: product.precio_venta || 0,
                tipo_catalogo: product.tipo_catalogo || 'producto'
            }));
        }
        if (prefill?.id_promocion) {
            currentForm.elements.promotion_id.value = prefill.id_promocion;
            currentForm.elements.nombre.value = prefill.nombre || '';
            currentForm.elements.descripcion_corta.value = prefill.descripcion_corta || '';
            currentForm.elements.tipo.value = prefill.tipo || 'porcentaje';
            currentForm.elements.valor.value = prefill.valor ?? '';
            currentForm.elements.cantidad_lleva.value = prefill.cantidad_lleva ?? 2;
            currentForm.elements.cantidad_paga.value = prefill.cantidad_paga ?? 1;
            currentForm.elements.fecha_inicio.value = toDatetimeLocal(prefill.fecha_inicio);
            currentForm.elements.fecha_fin.value = toDatetimeLocal(prefill.fecha_fin);
            currentForm.elements.activa.checked = Boolean(prefill.activa);
            const title = document.getElementById('modal-promocion-title');
            if (title) title.textContent = 'Editar promoción';
        }
        syncTipo();
        renderSeleccionados();
        modal.classList.remove('hidden');
        try {
            await buscarProductos('');
        } catch (error) {
            renderResultados([]);
            console.warn(error.message || error);
        }
    };

    window.abrirModalPromocionDesdeJSON = function(rawPromotion) {
        try {
            window.abrirModalPromocion(JSON.parse(rawPromotion));
        } catch (_error) {
            alert('No se pudo cargar la promoción seleccionada.');
        }
    };

    window.abrirModalPromocionParaProducto = function(productId, productName) {
        window.abrirModalPromocion({
            productos: [{ id_producto: Number(productId), nombre: productName || '', codigo: '', precio_venta: 0, tipo_catalogo: 'producto' }]
        });
    };

    window.abrirModalPromocionParaProductoGastronomia = function(productId, productName, productPrice) {
        window.abrirModalPromocion({
            productos: [{ id_producto: Number(productId), nombre: productName || '', codigo: 'GASTRO', precio_venta: Number(productPrice || 0), tipo_catalogo: 'gastronomia' }]
        });
    };

    window.cerrarModalPromocion = function() {
        document.getElementById('modalPromocion')?.classList.add('hidden');
    };

    window.guardarPromocion = async function() {
        const currentForm = form();
        if (!currentForm) return;
        const promotionId = currentForm.elements.promotion_id.value;
        const payload = {
            slug_actual: slugActual(),
            nombre: currentForm.elements.nombre.value,
            descripcion_corta: currentForm.elements.descripcion_corta.value,
            tipo: currentForm.elements.tipo.value,
            valor: currentForm.elements.valor.value,
            cantidad_lleva: currentForm.elements.cantidad_lleva.value,
            cantidad_paga: currentForm.elements.cantidad_paga.value,
            fecha_inicio: currentForm.elements.fecha_inicio.value,
            fecha_fin: currentForm.elements.fecha_fin.value,
            activa: currentForm.elements.activa.checked,
            productos: state.productos.filter((product) => product.tipo_catalogo !== 'gastronomia').map((product) => product.id_producto),
            productos_gastronomia: state.productos.filter((product) => product.tipo_catalogo === 'gastronomia').map((product) => product.id_producto)
        };
        const url = promotionId ? `/api/tienda/admin/promociones/${promotionId}` : '/api/tienda/admin/promociones';
        const res = await fetch(url, {
            method: promotionId ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
            alert('No se pudo guardar la promoción: ' + (data.error || 'error'));
            return;
        }
        window.cerrarModalPromocion();
        if (window.appNavigateActiveTab) {
            await window.appNavigateActiveTab('/tienda-admin');
        } else {
            window.location.reload();
        }
    };

    window.eliminarPromocion = async function(promotionId) {
        if (!confirm('¿Eliminar esta promoción?')) return;
        const url = new URL(`/api/tienda/admin/promociones/${promotionId}`, window.location.origin);
        url.searchParams.set('slug_actual', slugActual());
        const res = await fetch(url.toString(), { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) {
            alert('No se pudo eliminar la promoción: ' + (data.error || 'error'));
            return;
        }
        if (window.appNavigateActiveTab) {
            await window.appNavigateActiveTab('/tienda-admin');
        } else {
            window.location.reload();
        }
    };

    document.addEventListener('change', (event) => {
        if (event.target.matches('#formPromocion [name="tipo"]')) syncTipo();
    });

    document.addEventListener('input', (event) => {
        if (!event.target.matches('#promocionProductoSearch')) return;
        const term = (event.target.value || '').trim();
        window.clearTimeout(state.busquedaTimer);
        state.busquedaTimer = window.setTimeout(() => {
            buscarProductos(term).catch((error) => alert(error.message || 'No se pudo buscar productos'));
        }, 250);
    });

    document.addEventListener('click', (event) => {
        const resultLink = event.target.closest('#tienda-admin-results a[href]');
        const { form: searchForm } = elementosBusquedaAdmin();
        if (resultLink && searchForm) {
            const url = new URL(resultLink.href, window.location.origin);
            if (url.pathname === searchForm.getAttribute('action')) {
                event.preventDefault();
                cargarResultadosAdmin(url);
                return;
            }
        }
        const addButton = event.target.closest('[data-promo-add]');
        if (addButton) {
            try {
                const product = JSON.parse(decodeURIComponent(addButton.dataset.promoAdd));
                if (!state.productos.some((item) => productoKey(item) === productoKey(product))) {
                    state.productos.push(product);
                    renderSeleccionados();
                }
            } catch (_error) { }
            return;
        }
        const removeButton = event.target.closest('[data-promo-remove]');
        if (removeButton) {
            state.productos = state.productos.filter((item) => productoKey(item) !== removeButton.dataset.promoRemove);
            renderSeleccionados();
        }
    });

    document.addEventListener('submit', (event) => {
        if (!event.target.matches('#tienda-admin-search-form')) return;
        event.preventDefault();
        window.tiendaAdminEnviarBusqueda();
    });
})();
</script>
