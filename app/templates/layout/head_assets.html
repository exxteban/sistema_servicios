    <script>
        (function () {
            if (window.__appShellViewportInit) return;
            window.__appShellViewportInit = true;

            let rafId = null;

            function getViewportHeight() {
                const vv = window.visualViewport;
                const rawHeight = vv && typeof vv.height === 'number'
                    ? vv.height
                    : (window.innerHeight || document.documentElement.clientHeight || 0);
                return Math.max(0, Math.round(rawHeight || 0));
            }

            function applyViewportHeight() {
                rafId = null;
                const viewportHeight = getViewportHeight();
                if (!viewportHeight) return;
                document.documentElement.style.setProperty('--app-shell-vh', `${viewportHeight}px`);
                window.__appShellViewportHeight = viewportHeight;
            }

            function queueViewportHeightUpdate() {
                if (rafId !== null) return;
                rafId = window.requestAnimationFrame(applyViewportHeight);
            }

            window.__appShellGetViewportHeight = getViewportHeight;

            ['resize', 'orientationchange', 'pageshow', 'load'].forEach((eventName) => {
                window.addEventListener(eventName, queueViewportHeightUpdate, { passive: true });
            });

            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    queueViewportHeightUpdate();
                }
            });

            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', queueViewportHeightUpdate, { passive: true });
            }

            queueViewportHeightUpdate();
        })();
    </script>

    <script>
        (function () {
            if (window.__appShellTopbarInit) return;
            window.__appShellTopbarInit = true;

            let resizeObserver = null;

            function syncTopbarHeight() {
                const topbar = document.querySelector('[data-app-topnav]');
                if (!topbar) return;
                const height = Math.max(56, Math.ceil(topbar.getBoundingClientRect().height || 0));
                document.documentElement.style.setProperty('--app-shell-topbar-height', `${height}px`);
            }

            function bindTopbarHeight() {
                syncTopbarHeight();
                const topbar = document.querySelector('[data-app-topnav]');
                if (!topbar || typeof ResizeObserver !== 'function') return;
                resizeObserver = new ResizeObserver(syncTopbarHeight);
                resizeObserver.observe(topbar);
            }

            window.addEventListener('resize', syncTopbarHeight, { passive: true });
            window.addEventListener('load', syncTopbarHeight, { passive: true });

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', bindTopbarHeight, { once: true });
            } else {
                bindTopbarHeight();
            }
        })();
    </script>

    <script>
        (function () {
            const originalFetch = window.fetch;
            if (!originalFetch) return;
            window.fetch = function (input, init) {
                init = init || {};
                const method = String(init.method || 'GET').toUpperCase();
                const safe = method === 'GET' || method === 'HEAD' || method === 'OPTIONS';
                const meta = document.querySelector('meta[name="csrf-token"]');
                const token = meta ? (meta.getAttribute('content') || '') : '';
                if (!safe && token) {
                    let sameOrigin = true;
                    try {
                        const url = (typeof input === 'string' || input instanceof URL)
                            ? new URL(input, window.location.origin)
                            : new URL(input.url, window.location.origin);
                        sameOrigin = url.origin === window.location.origin;
                    } catch { }
                    if (sameOrigin) {
                        if (init.headers instanceof Headers) {
                            if (!init.headers.has('X-CSRFToken') && !init.headers.has('X-CSRF-Token')) {
                                init.headers.set('X-CSRFToken', token);
                            }
                        } else {
                            init.headers = init.headers || {};
                            if (!('X-CSRFToken' in init.headers) && !('X-CSRF-Token' in init.headers)) {
                                init.headers['X-CSRFToken'] = token;
                            }
                        }
                    }
                }
                return new Promise((resolve, reject) => {
                    originalFetch(input, init).then(async (response) => {
                        let responseUrl = null;
                        try { responseUrl = new URL(response.url, window.location.origin); } catch { }

                        const isLoginPath = responseUrl && responseUrl.pathname && responseUrl.pathname.startsWith('/auth/login');
                        const isLoginRedirect = response.redirected && isLoginPath && responseUrl.origin === window.location.origin;

                        if (response.status === 401 || isLoginRedirect) {
                            try {
                                const next = window.location.pathname + window.location.search + window.location.hash;
                                const dest = new URL('/auth/login', window.location.origin);
                                dest.searchParams.set('next', next);
                                window.location.replace(dest.toString());
                            } catch {
                                window.location.reload();
                            }
                            return;
                        }

                        resolve(response);
                    }).catch(reject);
                }).then(async (response) => {
                    if (safe || response.status !== 400) return response;
                    if (init && init.__csrfRetried) return response;

                    let sameOrigin = true;
                    try {
                        const url = (typeof input === 'string' || input instanceof URL)
                            ? new URL(input, window.location.origin)
                            : new URL(input.url, window.location.origin);
                        sameOrigin = url.origin === window.location.origin;
                    } catch { }
                    if (!sameOrigin) return response;

                    let data = null;
                    try {
                        data = await response.clone().json();
                    } catch { }
                    if (!data || data.error !== 'csrf') return response;

                    let refreshed = null;
                    try {
                        const r = await originalFetch('/auth/csrf', { method: 'GET', headers: { 'Accept': 'application/json' } });
                        if (r.ok) refreshed = await r.json();
                    } catch { }
                    if (!refreshed || !refreshed.csrf_token) return response;

                    const meta2 = document.querySelector('meta[name="csrf-token"]');
                    if (meta2) meta2.setAttribute('content', refreshed.csrf_token);

                    const retryInit = Object.assign({}, init, { __csrfRetried: true });
                    if (retryInit.headers instanceof Headers) {
                        retryInit.headers.set('X-CSRFToken', refreshed.csrf_token);
                    } else {
                        retryInit.headers = retryInit.headers || {};
                        retryInit.headers['X-CSRFToken'] = refreshed.csrf_token;
                    }
                    return originalFetch(input, retryInit);
                });
            };
        })();
    </script>

    <script>
        (function () {
            let chartJsPromise = null;
            window.ensureChartJs = function () {
                if (window.Chart) return Promise.resolve(window.Chart);
                if (chartJsPromise) return chartJsPromise;

                chartJsPromise = new Promise((resolve, reject) => {
                    const s = document.createElement('script');
                    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js';
                    s.async = true;
                    s.onload = () => window.Chart ? resolve(window.Chart) : reject(new Error('Chart.js no disponible'));
                    s.onerror = () => reject(new Error('No se pudo cargar Chart.js'));
                    document.head.appendChild(s);
                });

                return chartJsPromise;
            };
        })();
    </script>
