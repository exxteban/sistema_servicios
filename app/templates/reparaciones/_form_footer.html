<div class="flex justify-end gap-4 mt-8">
    <a href="{{ url_for('reparaciones.listar') }}"
        class="px-6 py-2 bg-gray-300 dark:bg-gray-700 hover:bg-gray-400 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-100 rounded font-bold transition">
        Cancelar
    </a>
    <button type="submit" id="btn-submit-reparacion" form="form-reparacion"
        class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-bold shadow transition">
        {% if editar %}Guardar Cambios{% else %}Registrar Recepción{% endif %}
    </button>
</div>
