{% extends "base.html" %}

{% block title %}{{ 'Editar Caja' if caja else 'Nueva Caja' }}{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md p-6 transition-colors duration-300">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-gray-800 dark:text-white">
                <i class="fas fa-layer-group text-purple-600 dark:text-purple-400 mr-2"></i>{{ 'Editar Caja' if caja else 'Nueva Caja' }}
            </h1>
            <a href="{{ url_for('caja.cajas_listar') }}"
                class="text-sm text-gray-600 hover:text-gray-900 dark:text-gray-300 dark:hover:text-white transition-colors">
                Volver
            </a>
        </div>

        <form method="POST"
            action="{% if caja %}{{ url_for('caja.cajas_editar', id_caja=caja.id_caja) }}{% else %}{{ url_for('caja.cajas_nueva') }}{% endif %}"
            class="space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-2">Nombre</label>
                <input type="text" name="nombre" required value="{{ caja.nombre if caja else '' }}"
                    class="w-full border-2 border-gray-200 dark:border-gray-700 rounded-lg py-2 px-4 bg-white dark:bg-gray-900 text-gray-800 dark:text-white">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-2">Ubicación</label>
                <input type="text" name="ubicacion" value="{{ caja.ubicacion if caja and caja.ubicacion else '' }}"
                    class="w-full border-2 border-gray-200 dark:border-gray-700 rounded-lg py-2 px-4 bg-white dark:bg-gray-900 text-gray-800 dark:text-white">
            </div>

            <div class="flex items-center gap-3">
                <input id="activa" type="checkbox" name="activa" value="1" {% if (caja and caja.activa) or (not caja) %}checked{% endif %}
                    class="w-4 h-4 text-purple-600 bg-gray-100 border-gray-300 rounded focus:ring-purple-500 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                <label for="activa" class="text-sm text-gray-700 dark:text-gray-200">Caja activa</label>
            </div>

            <button type="submit"
                class="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-lg font-semibold text-lg transition">
                <i class="fas fa-save mr-2"></i>Guardar
            </button>
        </form>
    </div>
</div>
{% endblock %}
