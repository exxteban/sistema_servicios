<!-- Modal de Explicación de Cálculos -->
<template x-teleport="body">
    <div x-show="explicacionModalOpen" class="fixed inset-0 z-50 overflow-y-auto" style="display: none;">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
            <!-- Overlay -->
            <div x-show="explicacionModalOpen" x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0"
                x-transition:enter-end="opacity-100" x-transition:leave="ease-in duration-200"
                x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
                class="fixed inset-0 transition-opacity bg-gray-500 bg-opacity-75" @click="explicacionModalOpen = false">
            </div>

            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

            <!-- Modal Content -->
            <div x-show="explicacionModalOpen" x-transition:enter="ease-out duration-300"
                x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100" x-transition:leave="ease-in duration-200"
                x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                class="inline-block align-bottom bg-white dark:bg-gray-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-4xl sm:w-full">
                
                <div class="bg-white dark:bg-gray-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="flex justify-between items-start mb-5">
                        <h3 class="text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
                            <i class="fas fa-info-circle text-blue-500"></i>
                            Guía de Cálculos de Cierre
                        </h3>
                        <button @click="explicacionModalOpen = false" class="text-gray-400 hover:text-gray-500 focus:outline-none">
                            <span class="sr-only">Cerrar</span>
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
                        
                        <!-- Columna Izquierda: Flujo General -->
                        <div class="space-y-4">
                            <h4 class="font-bold text-lg text-gray-800 dark:text-gray-200 border-b pb-2">Balance General</h4>
                            
                            <div class="bg-gray-50 dark:bg-gray-700/50 p-3 rounded-lg border border-gray-200 dark:border-gray-600">
                                <div class="font-bold text-emerald-600 dark:text-emerald-400 mb-1">INGRESOS</div>
                                <div class="text-gray-600 dark:text-gray-300 mb-2">Todo el dinero que entró a la caja.</div>
                                <div class="bg-white dark:bg-gray-800 p-2 rounded border border-gray-200 dark:border-gray-600 font-mono text-xs">
                                    Monto Inicial (Apertura)
                                    <br>+ Ventas (Todos los métodos)
                                    <br>+ Cobros de Créditos
                                    <br>+ Ingresos Manuales
                                </div>
                            </div>

                            <div class="bg-gray-50 dark:bg-gray-700/50 p-3 rounded-lg border border-gray-200 dark:border-gray-600">
                                <div class="font-bold text-red-600 dark:text-red-400 mb-1">EGRESOS</div>
                                <div class="text-gray-600 dark:text-gray-300 mb-2">Todo el dinero que salió de la caja.</div>
                                <div class="bg-white dark:bg-gray-800 p-2 rounded border border-gray-200 dark:border-gray-600 font-mono text-xs">
                                    Pagos a Proveedores (Compras)
                                    <br>+ Gastos/Retiros Manuales
                                    <br>+ Anulaciones de Venta
                                </div>
                            </div>

                            <div class="bg-gray-50 dark:bg-gray-700/50 p-3 rounded-lg border border-gray-200 dark:border-gray-600">
                                <div class="font-bold text-blue-600 dark:text-blue-400 mb-1">NETO</div>
                                <div class="text-gray-600 dark:text-gray-300">
                                    <span class="font-mono">INGRESOS - EGRESOS</span>
                                </div>
                            </div>
                        </div>

                        <!-- Columna Derecha: Control de Efectivo -->
                        <div class="space-y-4">
                            <h4 class="font-bold text-lg text-gray-800 dark:text-gray-200 border-b pb-2">Control de Efectivo</h4>
                            
                            <div class="bg-blue-50 dark:bg-blue-900/20 p-3 rounded-lg border border-blue-200 dark:border-blue-800">
                                <div class="font-bold text-blue-700 dark:text-blue-300 mb-1">1. SISTEMA (EFECTIVO)</div>
                                <div class="text-gray-600 dark:text-gray-300 text-xs mb-2">Cuánto efectivo debería haber en el cajón según la computadora.</div>
                                <div class="bg-white dark:bg-gray-800 p-2 rounded border border-gray-200 dark:border-gray-600 font-mono text-xs">
                                    Caja Inicial
                                    <br>+ Ventas en Efectivo
                                    <br>+ Cobros en Efectivo
                                    <br>+ Ingresos Varios en Efectivo
                                    <br>- Gastos/Retiros en Efectivo
                                    <br>- Pagos Compras en Efectivo
                                    <br>- Devoluciones en Efectivo
                                </div>
                            </div>

                            <div class="bg-purple-50 dark:bg-purple-900/20 p-3 rounded-lg border border-purple-200 dark:border-purple-800">
                                <div class="font-bold text-purple-700 dark:text-purple-300 mb-1">2. DECLARADO (EFECTIVO)</div>
                                <div class="text-gray-600 dark:text-gray-300 text-xs">
                                    El monto total de billetes y monedas que contaste manualmente y escribiste al cerrar la caja.
                                </div>
                            </div>

                            <div class="bg-yellow-50 dark:bg-yellow-900/20 p-3 rounded-lg border border-yellow-200 dark:border-yellow-800">
                                <div class="font-bold text-yellow-700 dark:text-yellow-300 mb-1">3. INGRESO REAL (EFECTIVO)</div>
                                <div class="text-gray-600 dark:text-gray-300 text-xs mb-2">Cuánto efectivo generó el turno (Ganancia en efectivo del día).</div>
                                <div class="bg-white dark:bg-gray-800 p-2 rounded border border-gray-200 dark:border-gray-600 font-mono text-xs">
                                    SISTEMA (EFECTIVO) - CAJA INICIAL
                                </div>
                            </div>

                            <div class="bg-gray-100 dark:bg-gray-700 p-3 rounded-lg border border-gray-300 dark:border-gray-500">
                                <div class="font-bold text-gray-800 dark:text-gray-200 mb-1">4. DIFERENCIA</div>
                                <div class="text-gray-600 dark:text-gray-300 text-xs mb-2">El resultado del arqueo.</div>
                                <div class="bg-white dark:bg-gray-800 p-2 rounded border border-gray-200 dark:border-gray-600 font-mono text-xs font-bold text-center">
                                    DECLARADO - SISTEMA
                                </div>
                                <div class="mt-2 text-xs grid grid-cols-2 gap-2 text-center">
                                    <span class="text-green-600 bg-green-100 px-1 rounded">0 = Perfecto</span>
                                    <span class="text-red-600 bg-red-100 px-1 rounded">Negativo = Faltante</span>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

                <div class="bg-gray-50 dark:bg-gray-700 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button type="button"
                        class="w-full inline-flex justify-center rounded-md border border-gray-300 dark:border-gray-600 shadow-sm px-4 py-2 bg-white dark:bg-gray-800 text-base font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:w-auto sm:text-sm"
                        @click="explicacionModalOpen = false">
                        Entendido
                    </button>
                </div>
            </div>
        </div>
    </div>
</template>
