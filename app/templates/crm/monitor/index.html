{% extends "crm/layout.html" %}

{% block crm_content %}
<div class="p-4 h-full flex flex-col" x-data="monitorPanel()">
    <div class="flex items-center gap-3 mb-4">
        <div class="p-2 bg-blue-500/15 rounded-xl">
            <i class="fas fa-robot text-2xl text-blue-400"></i>
        </div>
        <div>
            <h1 class="text-lg font-bold text-gray-100">Monitor IA</h1>
            <p class="text-sm text-gray-500">Conversaciones del bot con clientes</p>
        </div>
    </div>

    <div class="flex-1 min-h-0 flex gap-4">
        <div class="w-80 flex-shrink-0 bg-gray-800/40 rounded-2xl border border-white/10 flex flex-col overflow-hidden">
            <div class="p-3 border-b border-white/10 space-y-2">
                <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                    <i class="fas fa-robot text-blue-400"></i>
                    Conversaciones
                    <span class="text-xs font-normal text-gray-500" x-text="'(' + monitorTotal + ')'"></span>
                </h2>

                <input type="text" x-model="monitorBusqueda" placeholder="Buscar teléfono o nombre..."
                    class="w-full bg-gray-700/50 border border-white/10 rounded-lg px-3 py-1.5 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-blue-500/50">

                <div class="flex gap-1 flex-wrap">
                    <template x-for="m in ['todos','bot','asesor','derivacion']" :key="m">
                        <button @click="monitorFiltroModo = m; monitorPagina = 1; cargarMonitor()"
                            class="px-2 py-0.5 rounded-full text-[11px] font-semibold transition-colors"
                            :class="monitorFiltroModo === m ? 'bg-blue-500/20 text-blue-300' : 'bg-gray-700/50 text-gray-400 hover:bg-gray-700'">
                            <span x-text="m === 'todos' ? 'Todos' : m.charAt(0).toUpperCase() + m.slice(1)"></span>
                        </button>
                    </template>
                </div>

                <div class="flex gap-1">
                    <template x-for="[val, label] in [['', 'Todas'], ['true', 'Activas'], ['false', 'Cerradas']]" :key="val">
                        <button @click="monitorFiltroActiva = val; monitorPagina = 1; cargarMonitor()"
                            class="px-2 py-0.5 rounded-full text-[11px] font-semibold transition-colors"
                            :class="monitorFiltroActiva === val ? 'bg-emerald-500/20 text-emerald-300' : 'bg-gray-700/50 text-gray-400 hover:bg-gray-700'">
                            <span x-text="label"></span>
                        </button>
                    </template>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto">
                <template x-if="monitorCargando && monitorConversaciones.length === 0">
                    <div class="p-6 text-center text-gray-500">
                        <i class="fas fa-spinner fa-spin text-2xl mb-2 text-blue-400"></i>
                        <p class="text-xs">Cargando...</p>
                    </div>
                </template>
                <template x-if="!monitorCargando && monitorConversacionesFiltradas.length === 0">
                    <div class="p-6 text-center text-gray-500">
                        <i class="fas fa-inbox text-3xl mb-2 opacity-30"></i>
                        <p class="text-xs">Sin resultados</p>
                    </div>
                </template>

                <template x-for="conv in monitorConversacionesFiltradas" :key="conv.id">
                    <button @click="seleccionarMonitorConv(conv)"
                        class="w-full text-left p-3 border-b border-white/5 hover:bg-white/5 transition-colors"
                        :class="monitorConvActiva && monitorConvActiva.id === conv.id ? 'bg-blue-500/10 border-l-4 border-l-blue-500' : ''">
                        <div class="flex items-start gap-2">
                            <div class="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5"
                                :class="conv.modo === 'bot' ? 'bg-blue-500/15' : conv.modo === 'asesor' ? 'bg-emerald-500/15' : 'bg-yellow-500/15'">
                                <i class="text-sm"
                                    :class="conv.modo === 'bot' ? 'fas fa-robot text-blue-400' : conv.modo === 'asesor' ? 'fas fa-user text-emerald-400' : 'fas fa-clock text-yellow-400'"></i>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-start justify-between gap-1">
                                    <span class="font-semibold text-xs text-gray-100 truncate" x-text="conv.nombre_contacto || conv.telefono"></span>
                                    <span class="text-[10px] text-gray-500 flex-shrink-0" x-text="formatTime(conv.ultima_actividad)"></span>
                                </div>
                                <p class="text-[11px] text-gray-500 truncate mt-0.5" x-text="conv.ultimo_mensaje || '—'"></p>
                                <div class="flex items-center gap-1 mt-1 flex-wrap">
                                    <span class="text-[10px] px-1.5 py-0.5 rounded-full font-medium"
                                        :class="conv.modo === 'bot' ? 'bg-blue-500/15 text-blue-300' : conv.modo === 'asesor' ? 'bg-emerald-500/15 text-emerald-300' : 'bg-yellow-500/15 text-yellow-300'"
                                        x-text="conv.modo"></span>
                                    <span class="text-[10px] px-1.5 py-0.5 rounded-full font-medium"
                                        :class="conv.activa ? 'bg-emerald-500/15 text-emerald-300' : 'bg-gray-700/50 text-gray-400'"
                                        x-text="conv.activa ? 'activa' : 'cerrada'"></span>
                                    <span x-show="conv.tool_calls_count > 0" class="text-[10px] px-1.5 py-0.5 rounded-full bg-purple-500/15 text-purple-300 font-medium">
                                        <i class="fas fa-wrench mr-1"></i><span x-text="conv.tool_calls_count"></span>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </button>
                </template>
            </div>

            <div class="p-2 border-t border-white/10 flex items-center justify-between" x-show="monitorPages > 1">
                <button @click="monitorPagina--; cargarMonitor()" :disabled="monitorPagina <= 1"
                    class="px-3 py-1 text-xs rounded-lg bg-gray-700/50 text-gray-300 disabled:opacity-40 hover:bg-gray-700 transition-colors">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <span class="text-xs text-gray-500">
                    Pág <span x-text="monitorPagina"></span>/<span x-text="monitorPages"></span>
                </span>
                <button @click="monitorPagina++; cargarMonitor()" :disabled="monitorPagina >= monitorPages"
                    class="px-3 py-1 text-xs rounded-lg bg-gray-700/50 text-gray-300 disabled:opacity-40 hover:bg-gray-700 transition-colors">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <div class="flex-1 bg-gray-800/40 rounded-2xl border border-white/10 flex flex-col overflow-hidden min-w-0">
            <template x-if="!monitorConvActiva">
                <div class="flex-1 flex items-center justify-center text-gray-500">
                    <div class="text-center">
                        <i class="fas fa-robot text-6xl mb-4 opacity-20"></i>
                        <p class="text-lg font-medium">Seleccioná una conversación</p>
                        <p class="text-sm mt-1">Ver el historial completo del bot con el cliente</p>
                    </div>
                </div>
            </template>

            <template x-if="monitorConvActiva">
                <div class="flex flex-col h-full">
                    <div class="p-3 border-b border-white/10 bg-gray-900/30 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center"
                                :class="monitorConvActiva.modo === 'bot' ? 'bg-blue-500/15' : monitorConvActiva.modo === 'asesor' ? 'bg-emerald-500/15' : 'bg-yellow-500/15'">
                                <i :class="monitorConvActiva.modo === 'bot' ? 'fas fa-robot text-blue-400' : monitorConvActiva.modo === 'asesor' ? 'fas fa-user text-emerald-400' : 'fas fa-clock text-yellow-400'"></i>
                            </div>
                            <div>
                                <span class="font-semibold text-gray-100" x-text="monitorConvActiva.nombre_contacto || monitorConvActiva.telefono"></span>
                                <p class="text-xs text-gray-500" x-text="monitorConvActiva.telefono"></p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs px-2 py-1 rounded-full font-medium"
                                :class="monitorConvActiva.modo === 'bot' ? 'bg-blue-500/15 text-blue-300' : monitorConvActiva.modo === 'asesor' ? 'bg-emerald-500/15 text-emerald-300' : 'bg-yellow-500/15 text-yellow-300'"
                                x-text="'Modo: ' + monitorConvActiva.modo"></span>
                            <span class="text-xs px-2 py-1 rounded-full font-medium"
                                :class="monitorConvActiva.activa ? 'bg-emerald-500/15 text-emerald-300' : 'bg-gray-700/50 text-gray-400'"
                                x-text="monitorConvActiva.activa ? 'Activa' : 'Cerrada'"></span>
                            <span class="text-xs text-gray-500" x-text="'Inicio: ' + formatTime(monitorConvActiva.inicio_sesion)"></span>
                        </div>
                    </div>

                    <div class="flex-1 overflow-y-auto p-4 space-y-2 bg-gray-900/20" x-ref="monitorChatMessages">
                        <template x-if="monitorMensajesCargando">
                            <div class="flex justify-center py-8">
                                <i class="fas fa-spinner fa-spin text-gray-500 text-2xl"></i>
                            </div>
                        </template>
                        <template x-for="msg in monitorMensajes" :key="msg.id">
                            <div>
                                <template x-if="msg.contenido !== '[tool_call]' && msg.contenido !== '[tool_result]'">
                                    <div class="flex" :class="msg.direccion === 'entrante' ? 'justify-start' : 'justify-end'">
                                        <div class="max-w-[72%] rounded-2xl px-4 py-2 border border-white/10"
                                            :class="msg.direccion === 'entrante'
                                                ? 'bg-gray-800/60 text-gray-200 rounded-tl-sm'
                                                : (msg.remitente === 'bot'
                                                    ? 'bg-blue-500/10 text-blue-100 rounded-tr-sm'
                                                    : 'bg-emerald-500/10 text-emerald-100 rounded-tr-sm')">
                                            <p class="text-sm whitespace-pre-wrap" x-text="msg.contenido"></p>
                                            <div class="flex items-center justify-end gap-1 mt-1">
                                                <span class="text-[10px] text-gray-500" x-text="formatTime(msg.created_at)"></span>
                                                <template x-if="msg.direccion === 'saliente'">
                                                    <span class="text-[10px] text-gray-500" x-text="msg.remitente === 'bot' ? '🤖' : '👤'"></span>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </template>

                                <template x-if="msg.tool_call && (msg.contenido === '[tool_call]' || msg.contenido === '[tool_result]')">
                                    <div class="flex justify-center my-1">
                                        <div class="max-w-[80%] w-full">
                                            <button @click="msg._open = !msg._open"
                                                class="w-full flex items-center gap-2 px-3 py-1.5 rounded-xl bg-purple-500/10 border border-purple-500/20 text-purple-300 text-xs font-medium hover:bg-purple-500/15 transition-colors">
                                                <i class="fas fa-wrench"></i>
                                                <span x-text="getToolName(msg)"></span>
                                                <span class="ml-auto text-[10px] text-gray-500" x-text="formatTime(msg.created_at)"></span>
                                                <i class="fas text-[10px] text-gray-500" :class="msg._open ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                                            </button>
                                            <div x-show="msg._open" x-transition class="mt-1 rounded-xl overflow-hidden border border-purple-500/20">
                                                <pre class="text-[11px] p-3 bg-gray-950 text-green-300 overflow-x-auto whitespace-pre-wrap break-all leading-relaxed" x-text="formatToolCall(msg)"></pre>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <div x-show="monitorEventos.length > 0" class="pt-2 space-y-1">
                            <p class="text-[11px] font-semibold uppercase tracking-wider text-gray-500">Eventos operativos</p>
                            <template x-for="evento in monitorEventos" :key="evento.id">
                                <div class="text-[11px] px-3 py-1.5 rounded-full bg-white/5 border border-white/10 text-gray-400">
                                    <span x-text="describeEvento(evento)"></span>
                                    <span class="ml-2 opacity-60" x-text="formatTime(evento.created_at)"></span>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="border-t border-white/10 bg-gray-900/30">
                        <button @click="monitorContextoAbierto = !monitorContextoAbierto"
                            class="w-full flex items-center gap-2 px-4 py-2 text-xs font-semibold text-gray-500 hover:text-gray-200 transition-colors">
                            <i class="fas fa-code text-gray-500"></i>
                            Contexto JSON (debug)
                            <i class="fas ml-auto" :class="monitorContextoAbierto ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                        </button>
                        <div x-show="monitorContextoAbierto" x-transition class="border-t border-white/10">
                            <pre class="text-[11px] p-4 bg-gray-950 text-green-300 overflow-x-auto max-h-48 whitespace-pre-wrap break-all leading-relaxed" x-text="JSON.stringify(monitorContexto, null, 2)"></pre>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>

<script>
function monitorPanel() {
    return {
        monitorCargando: false,
        monitorConversaciones: [],
        monitorConvActiva: null,
        monitorMensajes: [],
        monitorEventos: [],
        monitorMensajesCargando: false,
        monitorContexto: {},
        monitorContextoAbierto: false,
        monitorFiltroModo: 'todos',
        monitorFiltroActiva: '',
        monitorBusqueda: '',
        monitorPagina: 1,
        monitorPages: 1,
        monitorTotal: 0,
        pollInterval: null,

        get monitorConversacionesFiltradas() {
            const q = this.monitorBusqueda.trim().toLowerCase();
            if (!q) return this.monitorConversaciones;
            return this.monitorConversaciones.filter(c =>
                (c.nombre_contacto || '').toLowerCase().includes(q) ||
                (c.telefono || '').toLowerCase().includes(q)
            );
        },

        async init() {
            await this.cargarMonitor();
            this.pollInterval = setInterval(() => this.cargarMonitor(), 10000);
        },

        async fetchJson(url) {
            try {
                const resp = await fetch(url, { headers: { 'Content-Type': 'application/json' } });
                let data = null;
                try { data = await resp.json(); } catch { data = null; }
                if (!resp.ok) return null;
                return data;
            } catch (e) {
                return null;
            }
        },

        async cargarMonitor() {
            const mostrarSpinner = this.monitorConversaciones.length === 0;
            if (mostrarSpinner) this.monitorCargando = true;

            const params = new URLSearchParams({ page: this.monitorPagina });
            if (this.monitorFiltroModo && this.monitorFiltroModo !== 'todos') params.set('modo', this.monitorFiltroModo);
            if (this.monitorFiltroActiva !== '') params.set('activa', this.monitorFiltroActiva);

            const data = await this.fetchJson(`/crm/api/monitor/conversaciones?${params}`);
            if (mostrarSpinner) this.monitorCargando = false;

            if (!data) return;
            this.monitorConversaciones = data.conversaciones || [];
            this.monitorTotal = data.total || 0;
            this.monitorPages = data.pages || 1;
        },

        async seleccionarMonitorConv(conv) {
            this.monitorConvActiva = conv;
            this.monitorMensajes = [];
            this.monitorEventos = [];
            this.monitorContexto = {};
            this.monitorContextoAbierto = false;
            this.monitorMensajesCargando = true;

            const data = await this.fetchJson(`/crm/api/monitor/conversacion/${conv.id}`);
            this.monitorMensajesCargando = false;
            if (!data) return;

            this.monitorConvActiva = { ...conv, ...(data.conversacion || {}) };
            this.monitorMensajes = (data.mensajes || []).map(m => ({ ...m, _open: false }));
            this.monitorEventos = data.eventos || [];
            this.monitorContexto = data.contexto || {};

            this.$nextTick(() => {
                const el = this.$refs.monitorChatMessages;
                if (el) el.scrollTop = el.scrollHeight;
            });
        },

        getToolName(msg) {
            if (!msg.tool_call) return 'tool';
            const tc = msg.tool_call;
            if (tc.tool_name) return tc.tool_name;
            if (tc.name) return tc.name;
            if (tc.raw_message && tc.raw_message.tool_calls && tc.raw_message.tool_calls[0]) {
                return tc.raw_message.tool_calls[0].function?.name || 'tool_call';
            }
            if (tc.tool_call_id) return 'tool_result';
            return 'tool';
        },

        formatToolCall(msg) {
            if (!msg.tool_call) return '';
            try {
                return JSON.stringify(msg.tool_call, null, 2);
            } catch {
                return String(msg.tool_call);
            }
        },

        describeEvento(evento) {
            const d = evento?.detalle || {};
            switch (evento?.tipo) {
                case 'asignacion_creada': return `Asignada a asesor #${d.id_asesor || '-'} para atención.`;
                case 'asignacion_actualizada': return `Reasignada a asesor #${d.id_asesor || '-'}${d.id_asesor_anterior ? ` desde #${d.id_asesor_anterior}` : ''}.`;
                case 'asesor_tomo_conversacion': return `${evento.usuario || 'Un asesor'} tomó la conversación.`;
                case 'asesor_acepto_conversacion': return `${evento.usuario || 'Un asesor'} aceptó la conversación.`;
                case 'asesor_devolvio_conversacion': return `${evento.usuario || 'Un asesor'} devolvió la conversación a la cola.`;
                case 'asesor_cerro_conversacion': return `${evento.usuario || 'Un asesor'} cerró la conversación.`;
                case 'asignacion_transferida': return `${evento.usuario || 'Un asesor'} transfirió la conversación a asesor #${d.id_asesor_destino || '-'}.`;
                case 'timeout_asignacion': return `Timeout de asignación: ${d.motivo || 'sin detalle'} (${d.accion || 'cola_general'}).`;
                case 'asesor_offline': return `La conversación volvió a cola porque el asesor #${d.id_asesor || '-'} quedó offline.`;
                case 'cola_asesores': return 'La conversación quedó en cola para asesores.';
                case 'handoff_web_creado': return 'Se creó un handoff desde el bot web.';
                case 'handoff_web_consumido': return 'Se vinculó una conversación de WhatsApp con un handoff del bot web.';
                default: return evento?.tipo || 'Evento';
            }
        },

        parseServerDate(isoStr) {
            if (!isoStr) return null;
            const s = String(isoStr).trim();
            if (!s) return null;
            const hasTz = /[zZ]$/.test(s) || /[+-]\d\d:\d\d$/.test(s);
            const d = new Date(hasTz ? s : `${s}Z`);
            return isNaN(d.getTime()) ? null : d;
        },

        formatTime(isoStr) {
            if (!isoStr) return '';
            try {
                const d = this.parseServerDate(isoStr);
                if (!d) return '';
                const now = new Date();
                const isToday = d.toDateString() === now.toDateString();
                if (isToday) {
                    return d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', hour12: false });
                }
                return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit' }) + ' ' +
                       d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', hour12: false });
            } catch { return ''; }
        }
    };
}
</script>
{% endblock %}
