{% extends "base.html" %}
{% block title %}Cambiar Contraseña{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md p-6 transition-colors duration-300">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white mb-6 text-center">
            <i class="fas fa-key text-blue-600 dark:text-blue-400 mr-2"></i>Cambiar Contraseña
        </h1>
        <form method="POST" action="{{ url_for('auth.cambiar_password') }}" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1">Contraseña Actual</label>
                <input type="password" name="password_actual" required
                    class="w-full border-2 border-gray-200 dark:border-gray-700 rounded-lg py-2 px-4 bg-white dark:bg-gray-900 text-gray-800 dark:text-white">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1">Nueva Contraseña</label>
                <input type="password" name="password_nueva" required
                    class="w-full border-2 border-gray-200 dark:border-gray-700 rounded-lg py-2 px-4 bg-white dark:bg-gray-900 text-gray-800 dark:text-white">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-200 mb-1">Confirmar
                    Contraseña</label>
                <input type="password" name="password_confirmar" required
                    class="w-full border-2 border-gray-200 dark:border-gray-700 rounded-lg py-2 px-4 bg-white dark:bg-gray-900 text-gray-800 dark:text-white">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg transition">Cambiar
                Contraseña</button>
        </form>
    </div>
</div>
{% endblock %}
