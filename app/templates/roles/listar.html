{% extends "base.html" %}

{% block title %}Roles{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white">
            <i class="fas fa-user-shield text-indigo-600 dark:text-indigo-400 mr-2"></i>Roles
        </h1>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md overflow-hidden transition-colors duration-300">
        <table class="w-full">
            <thead class="bg-gray-50 dark:bg-gray-700/60">
                <tr>
                    <th class="px-4 py-3 text-left text-sm font-semibold text-gray-600 dark:text-gray-300">Rol</th>
                    <th class="px-4 py-3 text-left text-sm font-semibold text-gray-600 dark:text-gray-300">Descripción</th>
                    <th class="px-4 py-3 text-center text-sm font-semibold text-gray-600 dark:text-gray-300">Nivel</th>
                    <th class="px-4 py-3 text-right text-sm font-semibold text-gray-600 dark:text-gray-300">Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for rol in roles %}
                <tr class="border-b border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/40 transition-colors">
                    <td class="px-4 py-3 font-medium text-gray-800 dark:text-gray-100">{{ rol.nombre }}</td>
                    <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-300">{{ rol.descripcion or '-' }}</td>
                    <td class="px-4 py-3 text-center text-sm text-gray-700 dark:text-gray-200">{{ rol.nivel_jerarquia }}</td>
                    <td class="px-4 py-3 text-right">
                        <a href="{{ url_for('roles.editar', id_rol=rol.id_rol) }}"
                            class="text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 transition-colors" title="Editar permisos">
                            <i class="fas fa-edit"></i> Editar permisos
                        </a>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="px-4 py-8 text-center text-gray-400 dark:text-gray-500">No hay roles editables</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
