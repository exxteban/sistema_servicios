<!-- Modal de Autorización de Administrador -->
<div x-data="modalAutorizacion"
    @abrir-autorizacion.window="mostrar = true; accion = $event.detail.accion; codigoPermiso = $event.detail.codigoPermiso; referenciaTipo = $event.detail.referenciaTipo; referenciaId = $event.detail.referenciaId; error = ''; $refs.username.value = ''; $refs.password.value = ''"
    x-show="mostrar" x-cloak class="fixed inset-0 z-50 overflow-y-auto" style="display: none;">

    <!-- Overlay -->
    <div class="fixed inset-0 bg-black bg-opacity-50 transition-opacity" @click="cancelar()"></div>

    <!-- Modal -->
    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="relative bg-white rounded-lg shadow-xl max-w-md w-full" @click.stop
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 transform scale-90"
            x-transition:enter-end="opacity-100 transform scale-100">

            <!-- Header -->
            <div class="bg-yellow-500 text-white px-6 py-4 rounded-t-lg">
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-semibold flex items-center">
                        <i class="fas fa-shield-alt mr-2"></i>
                        Autorización Requerida
                    </h3>
                    <button @click="cancelar()" class="text-white hover:text-gray-200">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
            </div>

            <!-- Body -->
            <div class="p-6">
                <!-- Alerta -->
                <div class="bg-yellow-50 border-l-4 border-yellow-500 p-4 mb-4">
                    <div class="flex">
                        <i class="fas fa-exclamation-triangle text-yellow-500 mr-3 mt-1"></i>
                        <div>
                            <p class="font-semibold text-yellow-800">Esta acción requiere autorización de un
                                administrador.</p>
                        </div>
                    </div>
                </div>

                <p class="text-gray-600 mb-4" x-text="'Acción: ' + accion"></p>

                <!-- Formulario -->
                <form @submit.prevent="solicitarAutorizacion()">
                    <div class="mb-4">
                        <label class="block text-gray-700 font-medium mb-2">Usuario Administrador</label>
                        <input type="text" x-ref="username" required autocomplete="username"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:border-transparent">
                    </div>

                    <div class="mb-4">
                        <label class="block text-gray-700 font-medium mb-2">Contraseña</label>
                        <input type="password" x-ref="password" required autocomplete="current-password"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:border-transparent">
                    </div>

                    <!-- Error -->
                    <div x-show="error" x-transition class="bg-red-50 border-l-4 border-red-500 p-4 mb-4">
                        <p class="text-red-800" x-text="error"></p>
                    </div>

                    <!-- Botones -->
                    <div class="flex justify-end space-x-3">
                        <button type="button" @click="cancelar()"
                            class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                            Cancelar
                        </button>
                        <button type="submit" :disabled="cargando"
                            class="px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 transition disabled:opacity-50 disabled:cursor-not-allowed">
                            <span x-show="!cargando">
                                <i class="fas fa-shield-check mr-2"></i>Autorizar
                            </span>
                            <span x-show="cargando">
                                <i class="fas fa-spinner fa-spin mr-2"></i>Autorizando...
                            </span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('modalAutorizacion', () => ({
            mostrar: false,
            accion: '',
            codigoPermiso: '',
            referenciaTipo: null,
            referenciaId: null,
            error: '',
            cargando: false,
            cancelar() {
                this.mostrar = false;
                window.dispatchEvent(new CustomEvent('autorizacion-cancelada'));
            },
            async solicitarAutorizacion() {
                this.cargando = true;
                this.error = '';

                try {
                    const response = await fetch('/api/autorizacion/solicitar', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            codigo_permiso: this.codigoPermiso,
                            accion: this.accion,
                            referencia_tipo: this.referenciaTipo,
                            referencia_id: this.referenciaId,
                            username_admin: this.$refs.username.value,
                            password_admin: this.$refs.password.value
                        })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        // Autorización exitosa
                        this.mostrar = false;
                        window.dispatchEvent(new CustomEvent('autorizacion-exitosa', {
                            detail: data
                        }));
                    } else {
                        // Error
                        this.error = data.error || 'Error al solicitar autorización';
                    }
                } catch (error) {
                    this.error = 'Error de conexión';
                } finally {
                    this.cargando = false;
                }
            }
        }));
    });
</script>
