<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menu TV</title>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at 12% 8%, rgba(249, 115, 22, 0.28), transparent 30%),
                radial-gradient(circle at 85% 0%, rgba(20, 184, 166, 0.22), transparent 32%),
                linear-gradient(135deg, #120b07 0%, #1d1410 46%, #081716 100%);
            color: #fff7ed;
            font-family: "Trebuchet MS", "Avenir Next", sans-serif;
            overflow-x: hidden;
        }
        body.menu-tv-high {
            background: #030712;
            color: #f9fafb;
        }
        body.menu-tv-slides-active {
            overflow: hidden;
        }
        body.menu-tv-scrolling .menu-tv-header,
        body.menu-tv-scrolling .menu-tv-category {
            will-change: transform;
        }
        .menu-tv-shell { min-height: 100vh; padding: clamp(24px, 4vw, 64px); }
        .menu-tv-header {
            display: flex;
            justify-content: space-between;
            gap: 32px;
            align-items: flex-start;
            margin-bottom: clamp(28px, 4vw, 56px);
        }
        .menu-tv-kicker {
            color: #fb923c;
            font-size: clamp(16px, 1.6vw, 24px);
            font-weight: 900;
            letter-spacing: 0.22em;
            text-transform: uppercase;
        }
        .menu-tv-title {
            margin: 8px 0 0;
            font-size: clamp(48px, 7vw, 118px);
            line-height: 0.9;
            letter-spacing: -0.06em;
        }
        .menu-tv-subtitle {
            max-width: 880px;
            margin: 18px 0 0;
            color: #fed7aa;
            font-size: clamp(22px, 2.4vw, 40px);
            font-weight: 700;
        }
        .menu-tv-clock {
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 24px;
            background: rgba(255,255,255,0.08);
            padding: 18px 24px;
            text-align: right;
            font-size: clamp(24px, 3vw, 54px);
            font-weight: 900;
        }
        .menu-tv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: clamp(18px, 2.4vw, 34px);
        }
        .menu-tv-slides {
            display: block;
            position: relative;
            min-height: 58vh;
        }
        .menu-tv-slide {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: clamp(18px, 2.4vw, 34px);
        }
        .menu-tv-slide.is-active {
            display: grid;
            animation: menu-tv-slide-in 850ms cubic-bezier(.16, 1, .3, 1) both;
        }
        .menu-tv-category {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 30px;
            background: linear-gradient(145deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05));
            box-shadow: 0 24px 80px rgba(0,0,0,0.22);
            padding: clamp(22px, 2.5vw, 36px);
            backdrop-filter: blur(18px);
            animation: menu-tv-card-rise 720ms cubic-bezier(.16, 1, .3, 1) both;
        }
        .menu-tv-category::after {
            content: "";
            position: absolute;
            inset: -60% auto auto -35%;
            width: 45%;
            height: 220%;
            background: linear-gradient(115deg, transparent, rgba(255,255,255,0.16), transparent);
            transform: rotate(18deg);
            animation: menu-tv-sheen 7s ease-in-out infinite;
            pointer-events: none;
        }
        .menu-tv-category h2 {
            margin: 0 0 18px;
            color: #fdba74;
            font-size: clamp(32px, 3.2vw, 62px);
            line-height: 1;
        }
        .menu-tv-product {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: baseline;
            border-top: 1px solid rgba(255,255,255,0.12);
            padding: 18px 0;
            animation: menu-tv-product-pop 640ms cubic-bezier(.16, 1, .3, 1) both;
        }
        .menu-tv-product--with-image {
            grid-template-columns: clamp(92px, 8vw, 150px) minmax(0, 1fr) auto;
            align-items: center;
        }
        .menu-tv-product:first-of-type { border-top: 0; }
        .menu-tv-product-image-wrap {
            aspect-ratio: 4 / 3;
            overflow: hidden;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
        }
        .menu-tv-product-image {
            display: block;
            height: 100%;
            width: 100%;
            object-fit: cover;
        }
        .menu-tv-product h3 {
            margin: 0;
            font-size: clamp(24px, 2.2vw, 42px);
            line-height: 1.05;
        }
        .menu-tv-product p {
            margin: 8px 0 0;
            color: #ffedd5;
            font-size: clamp(16px, 1.35vw, 24px);
            font-weight: 700;
        }
        .menu-tv-price {
            color: #bbf7d0;
            font-size: clamp(24px, 2.2vw, 44px);
            font-weight: 1000;
            white-space: nowrap;
        }
        .menu-tv-soldout { opacity: 0.55; }
        .menu-tv-badge {
            display: inline-block;
            margin-top: 10px;
            border-radius: 999px;
            background: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
            color: #ffffff;
            padding: 6px 14px;
            font-size: 16px;
            font-weight: 1000;
            text-transform: uppercase;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.14);
            animation: menu-tv-soldout-pulse 2.1s ease-in-out infinite;
        }
        .menu-tv-soldout .menu-tv-price {
            color: #ffffff;
        }
        .menu-tv-empty {
            border: 2px dashed rgba(255,255,255,0.22);
            border-radius: 32px;
            padding: 8vh 24px;
            text-align: center;
            font-size: clamp(28px, 3vw, 54px);
            font-weight: 900;
        }
        .menu-tv-status {
            position: fixed;
            right: clamp(18px, 3vw, 44px);
            bottom: clamp(18px, 3vw, 44px);
            z-index: 5;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 999px;
            background: rgba(3, 7, 18, 0.52);
            color: #ffedd5;
            padding: 10px 18px;
            font-size: clamp(13px, 1vw, 18px);
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            backdrop-filter: blur(16px);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 280ms ease, transform 280ms ease;
        }
        .menu-tv-status.is-visible {
            opacity: 1;
            transform: translateY(0);
        }
        @keyframes menu-tv-card-rise {
            from { opacity: 0; transform: translateY(28px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes menu-tv-product-pop {
            from { opacity: 0; transform: translateX(-14px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes menu-tv-slide-in {
            from { opacity: 0; transform: translateY(38px) scale(0.985); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        @keyframes menu-tv-sheen {
            0%, 62%, 100% { left: -40%; opacity: 0; }
            72% { opacity: 0.8; }
            88% { left: 115%; opacity: 0; }
        }
        @keyframes menu-tv-soldout-pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.14);
            }
            50% {
                transform: scale(1.045);
                box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.1);
            }
        }
        @media (max-width: 720px) {
            .menu-tv-grid { grid-template-columns: 1fr; }
            .menu-tv-slide { grid-template-columns: 1fr; }
            .menu-tv-product--with-image { grid-template-columns: 96px minmax(0, 1fr); }
            .menu-tv-product--with-image .menu-tv-price { grid-column: 2; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 1ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 1ms !important;
            }
        }
    </style>
</head>
<body>
    <main class="menu-tv-shell" data-menu-tv data-slug="{{ slug }}">
        <header class="menu-tv-header">
            <div>
                <div class="menu-tv-kicker">Menu del local</div>
                <h1 id="menu-tv-title" class="menu-tv-title">Menu</h1>
                <p id="menu-tv-subtitle" class="menu-tv-subtitle"></p>
            </div>
            <div id="menu-tv-clock" class="menu-tv-clock"></div>
        </header>
        <section id="menu-tv-content" class="menu-tv-grid"></section>
        <div id="menu-tv-status" class="menu-tv-status" aria-live="polite"></div>
    </main>
    <script src="{{ url_for('gastronomia.static', filename='js/menu_tv.js', v='20260528-1') }}"></script>
</body>
</html>
